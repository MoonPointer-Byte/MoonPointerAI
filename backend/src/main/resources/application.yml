server:
  port: 8080

spring:
  application:
    name: ai-translator
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB
  datasource:
    url: jdbc:mysql://localhost:3306/englishai?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

translator:
  notes:
    max-transcript-chars: 12000
  stt:
    enabled: true
    # 国内推荐硅基流动（cloud.siliconflow.cn 申请 Key）
    api-url: https://api.siliconflow.cn/v1/audio/transcriptions
    model: FunAudioLLM/SenseVoiceSmall
  llm:
    provider: deepseek
    api-url: https://api.deepseek.com/chat/completions
    model: deepseek-chat
    strict-translation-only: true
  session:
    max-context-segments: 30
    correction-window: 8
    correction-enabled: false

logging:
  level:
    com.englishai: INFO
